services:

  # Conteneur MongoDB
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db      # volume pour persister la base de données
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js  # script de création des utilisateurs

  # Conteneur qui exécute la migration
  migration:
    build: .                       # construit l'image depuis le Dockerfile
    container_name: migration
    depends_on:
      - mongodb                    # attend que MongoDB soit démarré
    environment:
      - MONGO_URI=mongodb://userAdmin:password123@mongodb:27017/healthcare_db   # on pointe vers le conteneur mongodb
    volumes:
      - ./data:/app/data           # volume pour accéder au CSV depuis le conteneur
    command: python migrate.py

volumes:
  mongodb_data:                    # volume nommé pour les données MongoDB


